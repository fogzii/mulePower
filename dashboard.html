<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matched Betting Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background-color: #1a1a1a;
        color: #e0e0e0;
        padding: 20px;
        min-height: 100vh;
        font-size: 16px;
      }

      /* Remove number input steppers */
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      input[type="number"] {
        appearance: textfield;
        -moz-appearance: textfield;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding-bottom: 5px;
        border-bottom: 2px solid #333;
      }

      .header-content {
        flex: 1;
        text-align: left;
      }

      h1 {
        color: #fff;
        font-size: 2em;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #888;
        font-size: 0.9em;
      }

      .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
        margin-bottom: 15px;
        flex-wrap: wrap;
      }

      .controls-left {
        flex-shrink: 0;
      }

      .controls-center {
        flex-shrink: 0;
      }

      .controls-right {
        flex-grow: 1;
        display: flex;
        justify-content: flex-end;
      }

      .status-bar {
        margin-bottom: 10px;
        padding: 10px 16px;
        text-align: center;
        font-size: 14px;
        border-radius: 6px;
        min-height: 24px;
      }

      .race-commission-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 15px;
        flex-wrap: wrap;
      }

      .race-info-block {
        color: #e0e0e0;
        font-size: 19px;
        font-weight: 600;
      }

      .race-info-block .commission-info-line {
        font-size: 15px;
        margin-top: 4px;
        font-weight: 200;
      }

      .commission-section {
        display: flex;
        gap: 15px;
        align-items: center;
        padding: 10px 16px;
        background-color: #2a2a2a;
        border-radius: 6px;
        flex-wrap: wrap;
      }

      .commission-section input[type="number"] {
        width: 70px;
        padding: 6px 10px;
        font-size: 14px;
        background-color: #333;
        border: 1px solid #555;
        border-radius: 4px;
        color: #e0e0e0;
      }

      #backStakeInput {
        width: 45px;
        padding: 4px 8px;
      }

      .commission-section input[type="number"]:focus {
        outline: none;
        border-color: #4caf50;
      }

      .filter-section {
        display: flex;
        gap: 15px;
        align-items: center;
        padding: 10px 16px;
        background-color: #2a2a2a;
        border-radius: 6px;
        flex-wrap: wrap;
      }

      .filter-label {
        color: #aaa;
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
      }

      .filter-inline-group {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .filter-options {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .toggle-all-btn {
        background-color: #333;
        color: #aaa;
        border: 1px solid #555;
        padding: 6px 12px;
        font-size: 13px;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.2s;
        white-space: nowrap;
      }

      .toggle-all-btn:hover {
        background-color: #444;
        border-color: #666;
      }

      .filter-checkbox {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        white-space: nowrap;
      }

      .filter-checkbox input[type="checkbox"] {
        width: 16px;
        height: 16px;
        cursor: pointer;
        accent-color: #4caf50;
      }

      .filter-checkbox label {
        color: #e0e0e0;
        font-size: 14px;
        cursor: pointer;
        user-select: none;
      }

      .filter-checkbox input[type="checkbox"]:disabled + label {
        color: #666;
        cursor: not-allowed;
      }

      button {
        background-color: #4caf50;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      button:hover {
        background-color: #45a049;
      }

      button:disabled {
        background-color: #555;
        cursor: not-allowed;
      }

      #collapseButtonRow button {
        background-color: #333;
        color: #aaa;
        font-size: 14px;
      }

      #collapseButtonRow button:hover {
        background-color: #444;
      }

      .table-container {
        overflow-x: auto;
        background-color: #2a2a2a;
        border-radius: 8px;
        padding: 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1100px;
      }

      thead {
        background-color: #333;
      }

      th {
        padding: 15px;
        text-align: center;
        font-weight: 600;
        color: #fff;
        border-bottom: 2px solid #444;
        white-space: nowrap;
      }

      tbody tr {
        border-bottom: 1px solid #333;
        transition:
          background-color 0.2s,
          transform 0.1s;
        cursor: pointer;
      }

      tbody tr:hover {
        background-color: #353535;
        transform: translateX(2px);
      }

      tbody tr:active {
        transform: scale(0.99);
      }

      td {
        padding: 15px;
        color: #e0e0e0;
        font-size: 16px;
        position: relative;
        vertical-align: middle;
        text-align: center;
      }

      /* Keep first column (Horse) left-aligned */
      th:first-child,
      td:first-child {
        text-align: left;
      }

      .odds-betfair {
        color: #4caf50;
        font-weight: 600;
        font-size: 17px;
      }

      .odds-bookie {
        color: #2196f3;
        font-weight: 600;
        font-size: 17px;
      }

      .bookie-label {
        font-size: 15px;
        color: #fff;
        font-weight: 600;
        background: #c62828;
        display: inline-block;
        padding: 4px 10px;
        border-radius: 4px;
        line-height: 1;
      }

      .bookie-logo {
        max-height: 24px;
        width: auto;
        display: block;
        margin: 0 auto;
        object-fit: contain;
      }

      .metric {
        font-weight: 700;
        font-size: 1.05em;
      }

      .metric.positive {
        color: #4caf50;
      }

      .metric.negative {
        color: #f44336;
      }

      .metric.neutral {
        color: #888;
      }

      .liquidity {
        color: #ff6b6b;
        font-weight: 500;
      }

      .stake-value {
        font-weight: 700;
        color: #fff;
      }

      .horse-name {
        font-size: 16px;
        font-weight: 500;
      }

      .neutral {
        color: #888;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #888;
      }

      .empty-state-icon {
        font-size: 3em;
        margin-bottom: 20px;
      }

      .empty-state-text {
        font-size: 1.2em;
        margin-bottom: 10px;
      }

      .empty-state-hint {
        font-size: 0.9em;
        color: #666;
      }

      .mode-toggle {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .mode-label {
        font-size: 14px;
        color: #e0e0e0;
        font-weight: 500;
      }

      .mode-select {
        padding: 6px 12px;
        font-size: 14px;
        background-color: #333;
        border: 1px solid #555;
        border-radius: 4px;
        color: #e0e0e0;
        cursor: pointer;
      }

      .mode-select:hover {
        border-color: #4caf50;
      }

      .mode-select:focus {
        outline: none;
        border-color: #4caf50;
      }

      .settings-btn {
        padding: 3px 3px;
        font-size: 18px;
        background-color: #333;
        border: 1px solid #555;
        border-radius: 4px;
        color: #e0e0e0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .settings-btn:hover {
        border-color: #4caf50;
        background-color: #3a3a3a;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
      }

      .modal-content {
        background-color: #2a2a2a;
        margin: 5% auto;
        padding: 0;
        border: 1px solid #555;
        border-radius: 8px;
        width: 90%;
        max-width: 600px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 24px;
        border-bottom: 1px solid #555;
      }

      .modal-header h2 {
        margin: 0;
        color: #fff;
        font-size: 1.5em;
      }

      .close {
        color: #888;
        font-size: 32px;
        font-weight: bold;
        cursor: pointer;
        line-height: 1;
      }

      .close:hover {
        color: #fff;
      }

      .modal-body {
        padding: 24px;
        max-height: 60vh;
        overflow-y: auto;
      }

      .settings-section {
        margin-bottom: 30px;
      }

      .settings-section:last-child {
        margin-bottom: 0;
      }

      .settings-section h3 {
        color: #4caf50;
        margin-bottom: 15px;
        font-size: 1.2em;
      }

      .threshold-inputs {
        display: flex;
        flex-direction: row;
        gap: 24px;
      }

      .threshold-col {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .threshold-col-right {
        align-items: flex-end;
      }

      .elite-mode-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #e0e0e0;
        font-size: 14px;
        margin-bottom: 12px;
        cursor: pointer;
      }

      .elite-mode-toggle input {
        cursor: pointer;
      }

      .threshold-inputs label {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #e0e0e0;
        font-size: 14px;
      }

      .threshold-inputs input {
        width: 80px;
        padding: 6px 10px;
        background-color: #333;
        border: 1px solid #555;
        border-radius: 4px;
        color: #e0e0e0;
        font-size: 14px;
      }

      .threshold-inputs input:focus {
        outline: none;
        border-color: #4caf50;
      }

      .modal-footer {
        display: flex;
        justify-content: space-between;
        padding: 20px 24px;
        border-top: 1px solid #555;
      }

      .primary-btn,
      .secondary-btn {
        padding: 10px 24px;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .primary-btn {
        background-color: #4caf50;
        color: white;
      }

      .primary-btn:hover {
        background-color: #45a049;
      }

      .secondary-btn {
        background-color: #555;
        color: #e0e0e0;
      }

      .secondary-btn:hover {
        background-color: #666;
      }

      .retention-dark-green {
        background-color: rgba(76, 175, 80, 0.25) !important;
      }

      .retention-light-green {
        background-color: rgba(139, 195, 74, 0.2) !important;
      }

      .retention-yellow {
        background-color: rgba(255, 235, 59, 0.15) !important;
      }

      .retention-orange {
        background-color: rgba(255, 152, 0, 0.15) !important;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-content">
        <h1>mulePower</h1>
      </div>
      <div class="mode-toggle">
        <label class="mode-label">Mode:</label>
        <select id="modeSelect" class="mode-select">
          <option value="bonus-place">Bonus Back for Placing</option>
          <option value="bonus-snr">Bonus Turnover (SNR)</option>
          <option value="non-promo">Non Promo</option>
        </select>
        <button
          id="settingsBtn"
          class="settings-btn"
          title="Color Threshold Settings"
        >
          ⚙️
        </button>
      </div>
    </div>

    <div class="race-commission-row">
      <div class="race-info-block">
        <div id="raceInfo"></div>
        <div id="commissionInfo" class="commission-info-line"></div>
      </div>
      <div class="commission-section">
        <span class="filter-label filter-inline-group" style="margin-left: 0">
          Back stake:
          <input
            type="number"
            id="backStakeInput"
            min="0"
            step="1"
            value="50"
            title="Back stake amount used for Lay $ and Xr"
          />
        </span>

        <span
          id="placesPaidWrapper"
          class="filter-label filter-inline-group"
          style="margin-left: 8px; display: none"
        >
          Places:
          <input
            type="number"
            id="placesPaidInput"
            min="1"
            max="10"
            step="1"
            value="3"
            title="Number of places that trigger bonus back (Bonus Back for Placing mode only)"
            style="width: 40px"
          />
        </span>

        <span class="filter-label filter-inline-group" style="margin-left: 8px">
          Back odds:
          <input
            type="number"
            id="minOddsInput"
            min="0"
            step="0.01"
            value="0"
            placeholder="min"
            title="Minimum bookmaker back odds to include"
            style="width: 50px"
          />
          -
          <input
            type="number"
            id="maxOddsInput"
            min="0"
            step="0.01"
            value=""
            placeholder="max"
            title="Maximum bookmaker back odds to include (leave blank for no max)"
            style="width: 50px"
          />
        </span>
      </div>
    </div>

    <div class="controls">
      <div class="controls-left">
        <div class="filter-checkbox">
          <input type="checkbox" id="commissionEnabled" checked />
          <label for="commissionEnabled">Apply Betfair commission</label>
        </div>

        <div class="filter-checkbox">
          <input type="checkbox" id="hideLayStake" />
          <label for="hideLayStake">Hide Lay $</label>
        </div>
      </div>
      <div class="controls-right">
        <div class="filter-section">
          <span class="filter-label">Filter Bookies:</span>
          <div class="filter-options">
            <div
              id="filterOptions"
              style="display: flex; gap: 12px; flex-wrap: wrap"
            >
              <!-- Dynamically populated based on available bookmakers -->
            </div>
            <button
              class="toggle-all-btn"
              id="toggleAllBtn"
              style="display: none"
            >
              Unselect All
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="status" class="status-bar"></div>

    <div class="table-container">
      <table id="oddsTable">
        <thead>
          <tr>
            <th>Horse</th>
            <th>Bookie</th>
            <th>Back</th>
            <th>Lay</th>
            <th>Liquidity</th>
            <th id="layStakeHeader">Lay $</th>
            <th id="xrHeader">Xr</th>
            <th id="evHeader">EV</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div id="settingsModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Color Threshold Settings</h2>
          <span class="close">&times;</span>
        </div>
        <div class="modal-body">
          <div class="settings-section">
            <h3>Bonus Turnover Mode (Retention %)</h3>
            <div class="threshold-inputs">
              <div class="threshold-col">
                <label
                  >Dark Green (≥):
                  <input
                    type="number"
                    id="bonus-dark-green"
                    step="0.1"
                    min="0"
                    max="100"
                  />%</label
                >
                <label
                  >Light Green (≥):
                  <input
                    type="number"
                    id="bonus-light-green"
                    step="0.1"
                    min="0"
                    max="100"
                  />%</label
                >
              </div>
              <div class="threshold-col threshold-col-right">
                <label
                  >Yellow (≥):
                  <input
                    type="number"
                    id="bonus-yellow"
                    step="0.1"
                    min="0"
                    max="100"
                  />%</label
                >
                <label
                  >Orange (≥):
                  <input
                    type="number"
                    id="bonus-orange"
                    step="0.1"
                    min="0"
                    max="100"
                  />%</label
                >
              </div>
            </div>
          </div>

          <div class="settings-section">
            <h3>Non-Promo Mode (% Loss/Win)</h3>
            <label class="elite-mode-toggle">
              <input type="checkbox" id="eliteModeCheckbox" />
              Elite mode
            </label>
            <div class="threshold-inputs">
              <div class="threshold-col">
                <label
                  >Dark Green (≥):
                  <input
                    type="number"
                    id="nonpromo-dark-green"
                    step="0.1"
                    min="-100"
                    max="100"
                  />%</label
                >
                <label
                  >Light Green (≥):
                  <input
                    type="number"
                    id="nonpromo-light-green"
                    step="0.1"
                    min="-100"
                    max="100"
                  />%</label
                >
              </div>
              <div class="threshold-col threshold-col-right">
                <label
                  >Yellow (≥):
                  <input
                    type="number"
                    id="nonpromo-yellow"
                    step="0.1"
                    min="-100"
                    max="100"
                  />%</label
                >
                <label
                  >Orange (≥):
                  <input
                    type="number"
                    id="nonpromo-orange"
                    step="0.1"
                    min="-100"
                    max="100"
                  />%</label
                >
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="resetDefaultsBtn" class="secondary-btn">
            Reset to Defaults
          </button>
          <button id="saveSettingsBtn" class="primary-btn">Save</button>
        </div>
      </div>
    </div>

    <script type="module" src="dashboard/modesLoader.js"></script>
    <script src="dashboard.js"></script>
    <script src="mocks/logoPreviewMock.js"></script>
  </body>
</html>
